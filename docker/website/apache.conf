<Directory /var/www/html>
    Options -Indexes
    AllowOverride All
    Require all granted
    php_admin_flag display_errors Off
    php_admin_flag display_startup_errors Off
    php_admin_flag log_errors On
</Directory>

<FilesMatch "^\.">
    Require all denied
</FilesMatch>

<Location "/dashboard">
    Require all denied
</Location>

<FilesMatch "^(applications\.html|indexconfig\.php|bitnami\.css)$">
    Require all denied
</FilesMatch>
